{% include "./Header.html"%}
<br>
<div class="container">
    <form method="POST">
        <div>
            <H2>College List</H2>
        </div>
        <div class="form-group row">
            <div class="col-lg-2">
                <input class="form-control" name="name" value="{{form.name}}" placeholder="College Name">
            </div>
            <div class="col-lg-2">
                <input class="form-control" name="address" value="{{form.address}}" placeholder="Address">
            </div>
            <div class="col-lg-2">
                <input class="form-control" name="state" value="{{form.state}}" placeholder="State">
            </div>
            <div class="col-lg-2">
                <input class="form-control" name="city" value="{{form.city}}" placeholder="City">
            </div>
            <div class="col-lg-1">
                <button class="btn btn-primary" type="submit">Search
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div class="offset-lg-4">
                <a href="/ORS/College">
                    <font class="btn btn-success" data-target="#update" data-toggle="modal">ADD <i class="fas fa-plus-circle"></i></font>
                </a>
            </div>
        </div>
    </form>

    <div class="row">
        <div class="col-md-12">
            <table class="table table-sm table-bordered table-hover table-responsive-sm">
                <thead class="thead-dark">
                    <th scope="row">#</th>
                    <th scope="row">NAME</th>
                    <th scope="row">ADDRESS</th>
                    <th scope="row">STATE</th>
                    <th scope="row">CITY</th>
                    <th scope="row">PHONE_NO</th>
                    <th scope="row">ACTION</th>
                </thead>
                <tbody>
                    {% for e in pageList %}
                    <tr>
                        <td>{{e.id}}</td>
                        <td>{{e.name}}</td>
                        <td>{{e.address}}</td>
                        <td>{{e.state}}</td>
                        <td>{{e.city}}</td>
                        <td>{{e.phoneNumber}}</td>
                        <td>
                            <a href="/ORS/College/{{e.id}}">
                                <font data-target="#update" data-toggle="modal" class="btn btn-primary">
                                    <i class="fas fa-edit"></i>
                                </font>
                            </a>
                            <a href="/ORS/CollegeList/delete/{{e.id}}">
                                <font data-target="#update" data-toggle="modal" class="btn btn-danger">
                                    <i class="fas fa-trash"></i>
                                </font>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% include "./Footer.html"%}
