{% include "./Header.html"%}
<br>
<div class="container">
    <form method="POST">
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-university"></i> College List</h5>
                <a href="/ORS/College" class="btn btn-success btn-sm">
                    <i class="fas fa-plus-circle"></i> Add College
                </a>
            </div>
            <div class="card-body">
                <div class="form-row align-items-end">
                    <div class="col-lg-2 col-md-4 mb-2">
                        <label class="small mb-1">College Name</label>
                        <input class="form-control form-control-sm" name="name" value="{{form.name}}" placeholder="College Name">
                    </div>
                    <div class="col-lg-2 col-md-4 mb-2">
                        <label class="small mb-1">Address</label>
                        <input class="form-control form-control-sm" name="address" value="{{form.address}}" placeholder="Address">
                    </div>
                    <div class="col-lg-2 col-md-4 mb-2">
                        <label class="small mb-1">State</label>
                        <input class="form-control form-control-sm" name="state" value="{{form.state}}" placeholder="State">
                    </div>
                    <div class="col-lg-2 col-md-4 mb-2">
                        <label class="small mb-1">City</label>
                        <input class="form-control form-control-sm" name="city" value="{{form.city}}" placeholder="City">
                    </div>
                    <div class="col-lg-2 col-md-4 mb-2">
                        <button class="btn btn-primary btn-sm btn-block" type="submit">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div class="row">
        <div class="col-md-12">
            <table class="table table-sm table-bordered table-hover table-responsive-sm">
                <thead class="thead-dark">
                    <th scope="col">#</th>
                    <th scope="col">NAME</th>
                    <th scope="col">ADDRESS</th>
                    <th scope="col">STATE</th>
                    <th scope="col">CITY</th>
                    <th scope="col">PHONE NO</th>
                    <th scope="col">ACTION</th>
                </thead>
                <tbody>
                    {% for e in pageList %}
                    <tr>
                        <td>{{e.id}}</td>
                        <td>{{e.name}}</td>
                        <td>{{e.address}}</td>
                        <td>{{e.state}}</td>
                        <td>{{e.city}}</td>
                        <td>{{e.phoneNumber}}</td>
                        <td>
                            <a href="/ORS/College/{{e.id}}" class="btn btn-primary btn-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a href="/ORS/CollegeList/delete/{{e.id}}" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% include "./Footer.html"%}
