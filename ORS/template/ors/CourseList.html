{% include "./Header.html"%}
<br>
<div class="container">
    <form method="POST">
        <div>
            <H2>Course List</H2>
        </div>
        <div class="form-group row">
            <div class="col-lg-2">
                <input class="form-control" name="name" value="{{form.name}}" placeholder="Course Name">
            </div>
            <div class="col-lg-2">
                <input class="form-control" name="description" value="{{form.description}}" placeholder="Description">
            </div>
            <div class="col-lg-2">
                <input class="form-control" name="duration" value="{{form.duration}}" placeholder="Duration">
            </div>
            <div class="col-lg-1">
                <button class="btn btn-primary" type="submit">Search
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div class="offset-lg-4">
                <a href="/ORS/Course">
                    <font class="btn btn-success" data-target="#update" data-toggle="modal">ADD <i class="fas fa-plus-circle"></i></font>
                </a>
            </div>
        </div>
    </form>

    <div class="row">
        <div class="col-md-12">
            <table class="table table-sm table-bordered table-hover table-responsive-sm">
                <thead class="thead-dark">
                    <th scope="row">#</th>
                    <th scope="row">COURSE_NAME</th>
                    <th scope="row">DESCRIPTION</th>
                    <th scope="row">DURATION</th>
                    <th scope="row">ACTION</th>
                </thead>
                <tbody>
                    {% for e in pageList %}
                    <tr>
                        <td>{{e.id}}</td>
                        <td>{{e.name}}</td>
                        <td>{{e.description}}</td>
                        <td>{{e.duration}}</td>
                        <td>
                            <a href="/ORS/Course/{{e.id}}">
                                <font data-target="#update" data-toggle="modal" class="btn btn-primary">
                                    <i class="fas fa-edit"></i>
                                </font>
                            </a>
                            <a href="/ORS/CourseList/delete/{{e.id}}">
                                <font data-target="#update" data-toggle="modal" class="btn btn-danger">
                                    <i class="fas fa-trash"></i>
                                </font>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% include "./Footer.html"%}
