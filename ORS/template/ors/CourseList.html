{% include "./Header.html"%}
<br>
<div class="container">
    <form method="POST">
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-book"></i> Course List</h5>
                <a href="/ORS/Course" class="btn btn-success btn-sm">
                    <i class="fas fa-plus-circle"></i> Add Course
                </a>
            </div>
            <div class="card-body">
                <div class="form-row align-items-end">
                    <div class="col-lg-3 col-md-4 mb-2">
                        <label class="small mb-1">Course Name</label>
                        <input class="form-control form-control-sm" name="name" value="{{form.name}}" placeholder="Course Name">
                    </div>
                    <div class="col-lg-3 col-md-4 mb-2">
                        <label class="small mb-1">Description</label>
                        <input class="form-control form-control-sm" name="description" value="{{form.description}}" placeholder="Description">
                    </div>
                    <div class="col-lg-2 col-md-4 mb-2">
                        <label class="small mb-1">Duration</label>
                        <input class="form-control form-control-sm" name="duration" value="{{form.duration}}" placeholder="Duration">
                    </div>
                    <div class="col-lg-2 col-md-4 mb-2">
                        <button class="btn btn-primary btn-sm btn-block" type="submit">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div class="row">
        <div class="col-md-12">
            <table class="table table-sm table-bordered table-hover table-responsive-sm">
                <thead class="thead-dark">
                    <th scope="col">#</th>
                    <th scope="col">COURSE NAME</th>
                    <th scope="col">DESCRIPTION</th>
                    <th scope="col">DURATION</th>
                    <th scope="col">ACTION</th>
                </thead>
                <tbody>
                    {% for e in pageList %}
                    <tr>
                        <td>{{e.id}}</td>
                        <td>{{e.name}}</td>
                        <td>{{e.description}}</td>
                        <td>{{e.duration}}</td>
                        <td>
                            <a href="/ORS/Course/{{e.id}}" class="btn btn-primary btn-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a href="/ORS/CourseList/delete/{{e.id}}" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% include "./Footer.html"%}
